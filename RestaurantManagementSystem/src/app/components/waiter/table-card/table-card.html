<div
  class="table-card"
  [class]="cardClass"
  [class.disabled]="!isClickable"
  (click)="onClick()">

  <h2 class="table-id">
    {{ table.tableNumber }}
  </h2>

  <div class="status-badge">
    <div class="dot"></div>
    <span class="text">{{ table.status }}</span>
  </div>

  @if (table.sessionOtp) {
    <div class="otp-badge">
      OTP: <strong>{{ table.sessionOtp }}</strong>
    </div>
  }

</div>
