@if (isOpen()) {

<div class="modal-overlay">

  <div class="modal-container">

    <div class="modal-header">
      <h3>Edit Tax Configuration</h3>
      <button type="button" class="icon-btn" (click)="close()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label>CGST (%)</label>
        <input
          type="number"
          step="0.1"
          min="0"
          [value]="cgst()"
          (input)="onCgstChange($event)">
        @if (cgstError()) {
          <small class="error-text">{{ cgstError() }}</small>
        }
      </div>

      <div class="form-group">
        <label>SGST (%)</label>
        <input
          type="number"
          step="0.1"
          min="0"
          [value]="sgst()"
          (input)="onSgstChange($event)">
        @if (sgstError()) {
          <small class="error-text">{{ sgstError() }}</small>
        }
      </div>

      <div class="form-group">
        <label>Service Charge (%)</label>
        <input
          type="number"
          step="0.1"
          min="0"
          [value]="serviceCharge()"
          (input)="onServiceChargeChange($event)">
        @if (serviceChargeError()) {
          <small class="error-text">{{ serviceChargeError() }}</small>
        }
      </div>

    </div>

    <div class="modal-footer">

      <button type="button" class="btn-cancel" (click)="close()">
        Cancel
      </button>

      <button type="button" class="btn-save" [disabled]="!isFormValid()" (click)="save()">
        Save Changes
      </button>

    </div>

  </div>

</div>

}
