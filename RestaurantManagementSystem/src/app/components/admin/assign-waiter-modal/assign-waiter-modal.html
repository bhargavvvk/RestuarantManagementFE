@if (isOpen()) {

<div class="modal-overlay">

    <div class="modal-container">

        <div class="modal-header">

            <h2>Assign Waiter to Table</h2>

            <button
                class="icon-btn"
                type="button"
                (click)="close()">

                <span class="material-symbols-outlined">
                    close
                </span>

            </button>

        </div>

        <div class="modal-body">

            <div class="form-group">

                <label>Select Table</label>

                <select
                    [value]="selectedTableId() ?? ''"
                    (change)="onTableSelected($event)">

                    <option value="">
                        Choose a table
                    </option>

                    @for (table of tables(); track table.id) {

                        <option [value]="table.id">
                            {{ table.tableNumber }} ({{ table.status }})
                        </option>

                    }

                </select>

            </div>

            @if (selectedTableId() !== null) {

                <div class="assignment-section">

                    <div class="current-assignment">

                        <span class="assignment-label">
                            Current Assignment
                        </span>

                        @if (currentWaiterName()) {

                            <p class="assignment-value">
                                {{ currentWaiterName() }}
                            </p>

                        } @else {

                            <p class="assignment-value unassigned">
                                No waiter assigned
                            </p>

                        }

                    </div>

                    <div class="form-group">

                        <label>Select Waiter</label>

                        <select
                            [value]="selectedWaiterId() ?? ''"
                            (change)="onWaiterSelected($event)">

                            <option value="">
                                Choose a waiter
                            </option>

                            @for (waiter of waiters(); track waiter.waiterId) {

                                <option [value]="waiter.waiterId">
                                    {{ waiter.name }}
                                </option>

                            }

                        </select>

                    </div>

                </div>

            }

        </div>

        <div class="modal-footer">

            <button
                class="secondary-btn"
                type="button"
                (click)="close()">

                Cancel

            </button>

            <button
                class="primary-btn"
                type="button"
                [disabled]="selectedTableId() === null || selectedWaiterId() === null"
                (click)="save()">

                Save Assignment

            </button>

        </div>

    </div>

</div>

}
