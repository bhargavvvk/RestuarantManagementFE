@if (isOpen()) {
    <div class="modal-backdrop" (click)="onClose()"></div>
}

<div
    class="modal-panel"
    [class.open]="isOpen()"
    role="dialog"
    aria-labelledby="addInventoryModalTitle"
    [attr.aria-hidden]="!isOpen()">

    <!-- Header -->
    <div class="modal-header">
        <h5 class="modal-title" id="addInventoryModalTitle">
            Add Inventory Item
        </h5>
        <button
            type="button"
            class="btn-close"
            aria-label="Close"
            (click)="onClose()">
        </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
        <form (submit)="$event.preventDefault(); onSave()">

            <!-- Item Name -->
            <div class="mb-3">
                <label class="form-label">
                    ITEM NAME <span class="required">*</span>
                </label>
                <input
                    type="text"
                    class="form-control"
                    placeholder="e.g. Basmati Rice"
                    [ngModel]="form().itemName"
                    (ngModelChange)="update('itemName', $event)"
                    name="itemName">
            </div>

            <!-- Quantity + Unit row -->
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label">
                        QUANTITY <span class="required">*</span>
                    </label>
                    <input
                        type="number"
                        class="form-control"
                        min="0"
                        step="0.01"
                        placeholder="0"
                        [ngModel]="form().currentQuantity"
                        (ngModelChange)="update('currentQuantity', +$event)"
                        name="currentQuantity">
                </div>
                <div class="col-6">
                    <label class="form-label">
                        UNIT <span class="required">*</span>
                    </label>
                    <input
                        type="text"
                        class="form-control"
                        placeholder="e.g. kg, L, pcs"
                        [ngModel]="form().unit"
                        (ngModelChange)="update('unit', $event)"
                        name="unit">
                </div>
            </div>

            <!-- Low Stock Threshold -->
            <div class="mb-4">
                <label class="form-label">
                    LOW STOCK THRESHOLD
                </label>
                <input
                    type="number"
                    class="form-control"
                    min="0"
                    step="0.01"
                    placeholder="Set warning limit"
                    [ngModel]="form().thresholdQuantity"
                    (ngModelChange)="update('thresholdQuantity', +$event)"
                    name="thresholdQuantity">
                <div class="form-hint">
                    Alert triggers when stock falls below this value.
                </div>
            </div>

            <!-- Actions -->
            <div class="modal-actions">
                <button
                    type="button"
                    class="btn btn-ghost"
                    (click)="onClose()">
                    Cancel
                </button>
                <button
                    type="submit"
                    class="btn btn-publish"
                    [disabled]="!isValid() || isSubmitting()">
                    @if (isSubmitting()) {
                        <span class="spinner-border spinner-border-sm me-2"></span>
                    }
                    Save Item
                </button>
            </div>

        </form>
    </div>

</div>
