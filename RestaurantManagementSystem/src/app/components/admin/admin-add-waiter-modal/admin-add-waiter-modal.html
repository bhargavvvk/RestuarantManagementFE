@if (isOpen()) {

<div class="modal-overlay">

  <div class="modal-container">

    <div class="modal-header">
      <h3>Add New Waiter</h3>
      <button type="button" class="icon-btn" (click)="close()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label>Full Name</label>
        <input
          type="text"
          placeholder="e.g. Rahul Kumar"
          [ngModel]="name()"
          (ngModelChange)="name.set($event)">
        @if (nameError()) {
          <small class="error-text">{{ nameError() }}</small>
        }
      </div>

      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          placeholder="e.g. rahul_k"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)">
        @if (usernameError()) {
          <small class="error-text">{{ usernameError() }}</small>
        }
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input
          type="tel"
          placeholder="e.g. +91 90000 00000"
          [ngModel]="mobileNumber()"
          (ngModelChange)="mobileNumber.set($event)">
        @if (mobileError()) {
          <small class="error-text">{{ mobileError() }}</small>
        }
      </div>

    </div>

    <div class="modal-footer">

      <button type="button" class="btn-secondary" (click)="close()">
        Cancel
      </button>

      <button type="button" class="btn-primary" [disabled]="!isFormValid()" (click)="create()">
        Add Waiter
      </button>

    </div>

  </div>

</div>

}
