<section class="summary-bar">
  <div class="summary-copy">
    @if (isSearching()) {
      <h3>
        Search results:
        <span class="count">{{ totalCount() }}</span>
      </h3>
      <p class="subtitle">Matching orders across all dates.</p>
    } @else {
      <h3>
        Orders on {{ formattedDate }}:
        <span class="count">{{ totalCount() }}</span>
      </h3>
      <p class="subtitle">Live summary of active and completed sessions.</p>
    }
  </div>

  @if (!isSearching()) {
    <div class="date-picker" (click)="openPicker()">
      <span class="material-symbols-outlined">calendar_today</span>
      <span class="date-label">{{ shortDateLabel }}</span>
      <span class="material-symbols-outlined chevron">arrow_drop_down</span>
      <input
        #dateInput
        type="date"
        [max]="today"
        [value]="selectedDate()"
        (change)="onDateChange($event)" />
    </div>
  }
</section>
