<div class="top-section">

  <app-header
    [tableNumber]="tableNumber()"
    variant="after-session"
    [otp]="sessionOtp">
  </app-header>

  <app-customer-request></app-customer-request>

  <app-menu-filter [hidden]="activeTab() !== 'menu'"></app-menu-filter>

</div>
<div
  class="page-content"
  [class.menu-content]="activeTab() === 'menu'"
  [class.simple-content]="activeTab() !== 'menu'">

  <app-menu-list [hidden]="activeTab() !== 'menu'"></app-menu-list>
  <app-customer-cart [hidden]="activeTab() !== 'cart'"></app-customer-cart>
  <app-customer-orders [hidden]="activeTab() !== 'orders'"></app-customer-orders>

</div>

<app-customer-bottom-nav
  [activeTab]="activeTab()"
  (tabChanged)="changeTab($event)">
</app-customer-bottom-nav>
