<app-kitchen-header
  [totalOrders]="todayOrderCount()">
</app-kitchen-header>

<div class="kitchen-container">

  <div class="mobile-orders-count">
    Today's Orders: {{ todayOrderCount() }}
  </div>

  <div class="tabs">

    <button
      class="tab-button"
      [class.active]="selectedTab() === 'queue'"
      (click)="selectedTab.set('queue')">

      Queue

    </button>

    <button
      class="tab-button"
      [class.active]="selectedTab() === 'preparing'"
      (click)="selectedTab.set('preparing')">

      Preparing

    </button>

    <button
      class="tab-button"
      [class.active]="selectedTab() === 'ready'"
      (click)="selectedTab.set('ready')">

      Ready

    </button>

  </div>

  <p class="summary-text">
    {{ summaryText() }}
  </p>

  <div [hidden]="selectedTab() !== 'queue'">

    <div class="orders-grid">

      @for(order of queueOrders(); track order.orderId) {

  <app-kitchen-order-card
  [order]="order"
    (startPreparing)="onStartPreparing($event)">
    </app-kitchen-order-card>

      }

    </div>

  </div>

  <div [hidden]="selectedTab() !== 'preparing'">

    <div class="orders-grid">

      @for(order of preparingOrders(); track order.orderId) {

       <app-preparing-order-card
        [order]="order"
        (itemReady)="onItemReady($event)">
        </app-preparing-order-card>

      }

    </div>

  </div>

  <div [hidden]="selectedTab() !== 'ready'">

    <div class="orders-grid">

      @for(order of readyOrders(); track order.orderId) {

        <app-ready-order-card
          [order]="order">
        </app-ready-order-card>

      }

    </div>

  </div>

</div>
